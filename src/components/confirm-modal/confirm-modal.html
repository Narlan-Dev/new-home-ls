<div class="confirm-modal" id="confirmModal" hidden>
  <div class="confirm-modal__backdrop" id="confirmBackdrop"></div>
  <div class="confirm-modal__box">
    <div class="confirm-modal__head">
      <span class="jd-tag" id="confirmTag">confirmação</span>
      <button class="confirm-modal__close" id="confirmClose">&times;</button>
    </div>
    <div class="confirm-modal__body">
      <p class="confirm-modal__msg" id="confirmMsg"></p>
      <div class="confirm-modal__actions">
        <button class="jd-btn jd-btn--ghost" id="confirmCancel">cancelar</button>
        <button class="jd-btn jd-btn--primary" id="confirmOk">confirmar</button>
      </div>
    </div>
  </div>
</div>
